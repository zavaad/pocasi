<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Počasí">
<meta name="theme-color" content="#1a2a4a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Počasí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --card-bg: rgba(255,255,255,0.12);
    --card-border: rgba(255,255,255,0.18);
    --text-primary: #fff;
    --text-secondary: rgba(255,255,255,0.75);
    --text-tertiary: rgba(255,255,255,0.5);
    --accent: #5ac8fa;
    --font: 'Outfit', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--text-primary);
    background: #1a2a4a;
  }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    transition: background 2s ease;
  }
  #bg.clear-day    { background: linear-gradient(180deg, #1a6fc4 0%, #2d9ee8 40%, #5ac8fa 100%); }
  #bg.clear-night  { background: linear-gradient(180deg, #0a0e1a 0%, #0d1b3e 50%, #1a2a4a 100%); }
  #bg.cloudy-day   { background: linear-gradient(180deg, #5a7fa0 0%, #7a9db8 50%, #9eb8cc 100%); }
  #bg.cloudy-night { background: linear-gradient(180deg, #1a2030 0%, #253040 50%, #304050 100%); }
  #bg.rainy-day    { background: linear-gradient(180deg, #2a3a50 0%, #3a5070 50%, #4a6080 100%); }
  #bg.rainy-night  { background: linear-gradient(180deg, #0a1018 0%, #151f2a 50%, #1e2d3a 100%); }
  #bg.snowy        { background: linear-gradient(180deg, #c0d8e8 0%, #d8e8f0 50%, #e8f0f8 100%); }
  #bg.thunderstorm { background: linear-gradient(180deg, #1a1520 0%, #2a2030 50%, #1e2535 100%); }

  /* Stars for night */
  #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1s; }
  #bg.clear-night ~ #stars,
  #bg.cloudy-night ~ #stars { opacity: 1; }

  /* ── PAGES (swipe) ── */
  #pages-wrapper {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .page {
    min-width: 100vw; height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .page::-webkit-scrollbar { display: none; }

  /* ── PAGE DOTS ── */
  #page-dots {
    position: fixed; bottom: calc(var(--safe-bottom) + 52px);
    left: 50%; transform: translateX(-50%);
    z-index: 50; display: flex; gap: 6px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease; cursor: pointer;
  }
  .dot.gps::before { content: '⌖'; position: absolute; font-size: 9px; top: -2px; left: -2px; }
  .dot.active { background: #fff; transform: scale(1.2); }

  /* ── BOTTOM TAB BAR ── */
  #tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    height: calc(50px + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(15,20,35,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: space-around;
  }
  .tab-btn {
    flex: 1; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    background: none; border: none; color: var(--text-tertiary);
    font-size: 10px; font-family: var(--font); cursor: pointer;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn svg { width: 22px; height: 22px; }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    padding: 14px 16px;
    margin: 0 16px 12px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-secondary);
    margin-bottom: 10px;
  }

  /* ── WEATHER PAGE ── */
  .weather-page-content {
    padding-top: calc(var(--safe-top) + 10px);
    padding-bottom: calc(var(--safe-bottom) + 100px);
    min-height: 100%;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 12px 20px 20px;
  }
  .city-name {
    font-size: 17px; font-weight: 500; letter-spacing: 0.02em;
    color: var(--text-primary); margin-bottom: 2px;
  }
  .hero-temp {
    font-size: 88px; font-weight: 200; line-height: 1;
    letter-spacing: -4px; margin: 4px 0 2px;
  }
  .hero-desc {
    font-size: 17px; font-weight: 400; color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .hero-range {
    font-size: 15px; color: var(--text-secondary);
    display: flex; gap: 6px; justify-content: center; align-items: center;
  }

  /* Consensus bar */
  .consensus-bar-wrap { padding: 0 20px 16px; }
  .consensus-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-secondary); margin-bottom: 6px;
  }
  .confidence-badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; letter-spacing: 0.04em;
  }
  .conf-high { background: rgba(52,199,89,0.25); color: #34c759; }
  .conf-med  { background: rgba(255,159,10,0.25); color: #ff9f0a; }
  .conf-low  { background: rgba(255,69,58,0.25);  color: #ff453a; }
  .range-bar-outer {
    height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.15); position: relative;
    overflow: visible;
  }
  .range-bar-fill {
    position: absolute; top: 0; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, rgba(90,200,250,0.6), rgba(90,200,250,1));
    transition: all 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .range-bar-dot {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(90,200,250,0.8), 0 2px 4px rgba(0,0,0,0.4);
    transition: left 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* Quick stats row */
  .quick-stats {
    display: flex; gap: 10px; padding: 0 16px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .quick-stats::-webkit-scrollbar { display: none; }
  .stat-pill {
    flex-shrink: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 22px; padding: 8px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    min-width: 72px;
  }
  .stat-pill-label { font-size: 10px; color: var(--text-tertiary); font-weight: 500; }
  .stat-pill-val   { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .stat-pill-sub   { font-size: 10px; color: var(--text-secondary); }

  /* Hourly */
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 0;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card {
    flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; gap: 5px; padding: 10px 8px;
    min-width: 60px; border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .hour-card.now {
    background: rgba(90,200,250,0.2);
    border-color: rgba(90,200,250,0.4);
  }
  .hour-time  { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .hour-icon  { font-size: 22px; }
  .hour-temp  { font-size: 15px; font-weight: 600; }
  .hour-rain  { font-size: 11px; color: #5ac8fa; }

  /* Daily */
  .day-row {
    display: flex; align-items: center; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .day-row:last-child { border-bottom: none; }
  .day-name { flex: 0 0 70px; font-size: 15px; font-weight: 500; }
  .day-icon { flex: 0 0 28px; font-size: 22px; }
  .day-rain { flex: 0 0 40px; font-size: 12px; color: #5ac8fa; font-weight: 500; }
  .day-range-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 500;
  }
  .day-lo { color: var(--text-tertiary); }
  .day-hi { color: var(--text-primary); }
  .day-bar-outer {
    flex: 1; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.12); position: relative; overflow: hidden;
  }
  .day-bar-fill {
    position: absolute; top: 0; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #5ac8fa, #ff9f0a);
  }

  /* Temp chart */
  #temp-chart-canvas {
    width: 100%; height: 110px; display: block;
    border-radius: 10px;
  }

  /* Radar */
  .radar-wrap {
    border-radius: 12px; overflow: hidden;
    height: 280px; position: relative;
  }
  .radar-wrap iframe {
    width: 100%; height: 100%; border: none; pointer-events: auto;
  }

  /* Source detail modal */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: flex-end; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal-box {
    background: rgba(25,35,55,0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px 20px 0 0;
    width: 100%; max-height: 70vh; overflow-y: auto;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  #modal-box h3 {
    font-size: 16px; font-weight: 600; margin-bottom: 16px;
    display: flex; justify-content: space-between;
  }
  .source-row {
    display: flex; align-items: center; padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .source-row:last-child { border-bottom: none; }
  .source-name { flex: 1; font-size: 14px; font-weight: 500; }
  .source-val  { font-size: 16px; font-weight: 600; color: var(--accent); }
  .source-sub  { font-size: 12px; color: var(--text-tertiary); }
  .source-dot  {
    width: 10px; height: 10px; border-radius: 50%;
    margin-right: 10px; flex-shrink: 0;
  }

  /* Settings page */
  .settings-page-content {
    padding: calc(var(--safe-top) + 60px) 0 calc(var(--safe-bottom) + 100px);
  }
  .settings-section { margin-bottom: 28px; }
  .settings-header {
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-secondary);
    padding: 0 20px; margin-bottom: 10px;
  }
  .settings-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    margin: 0 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
  }
  .settings-row {
    display: flex; align-items: center; padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    gap: 12px;
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { flex: 1; font-size: 15px; }
  .settings-row-val { font-size: 14px; color: var(--text-secondary); }
  .toggle {
    width: 44px; height: 26px; border-radius: 13px;
    background: rgba(255,255,255,0.2); position: relative;
    cursor: pointer; transition: background 0.3s; flex-shrink: 0;
  }
  .toggle.on { background: #34c759; }
  .toggle::after {
    content: ''; position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: transform 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform: translateX(18px); }
  select {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; color: #fff; font-family: var(--font);
    font-size: 14px; padding: 4px 8px; outline: none;
  }
  .city-list-item {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08); gap: 10px;
  }
  .city-list-item:last-child { border-bottom: none; }
  .city-list-item .city-temp { margin-left: auto; font-size: 18px; font-weight: 600; }
  .city-list-item .city-desc { font-size: 12px; color: var(--text-secondary); }
  .del-btn {
    background: rgba(255,69,58,0.2); border: none; border-radius: 8px;
    color: #ff453a; font-size: 18px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .add-city-row {
    display: flex; gap: 8px; margin: 12px 16px 0;
  }
  .add-city-input {
    flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; color: #fff; font-family: var(--font); font-size: 15px;
    padding: 10px 14px; outline: none;
  }
  .add-city-input::placeholder { color: rgba(255,255,255,0.4); }
  .add-city-btn {
    background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
    padding: 10px 16px; cursor: pointer;
  }
  .api-input {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    color: #fff; font-family: var(--font); font-size: 13px;
    padding: 8px 12px; outline: none; margin-top: 4px;
  }
  .api-input::placeholder { color: rgba(255,255,255,0.35); }
  .save-api-btn {
    margin: 12px 16px 0;
    width: calc(100% - 32px);
    background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
    padding: 12px; cursor: pointer;
  }

  /* Radar page */
  .radar-page-content {
    padding: calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 100px);
  }
  .radar-full {
    border-radius: 16px; overflow: hidden; height: calc(100vh - 200px);
  }
  .radar-full iframe { width: 100%; height: 100%; border: none; }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; z-index: 200;
    background: #0d1b3e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-icon { font-size: 52px; animation: spin 2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 16px; color: var(--text-secondary); }

  /* Refresh btn */
  #refresh-btn {
    position: fixed; top: calc(var(--safe-top) + 8px); right: 16px; z-index: 40;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; color: #fff; font-size: 13px; padding: 5px 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    cursor: pointer; font-family: var(--font); font-weight: 500;
  }

  /* Anim */
  .fade-in { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Alert banner */
  .alert-banner {
    margin: 0 16px 12px;
    background: rgba(255,69,58,0.2); border: 1px solid rgba(255,69,58,0.4);
    border-radius: 12px; padding: 10px 14px;
    font-size: 13px; display: none;
  }
  .alert-banner.show { display: block; }

  /* Confidence modal tap hint */
  .tap-hint {
    font-size: 11px; color: var(--text-tertiary); text-align: center;
    margin-top: 6px; margin-bottom: 4px;
  }

  /* Feels like / extra metric pill (hero) */
  .hero-extra {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 4px 14px; font-size: 14px; margin-top: 6px;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
  }
  .hero-extra-label { color: var(--text-secondary); font-size: 12px; }

  /* UV index color */
  .uv-low    { color: #34c759; }
  .uv-med    { color: #ff9f0a; }
  .uv-high   { color: #ff453a; }
  .uv-xhigh  { color: #bf5af2; }

  /* Responsive detail */
  @media (prefers-color-scheme: light) {
    /* We force dark always for weather app */
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader-icon">🌤️</div>
  <div class="loader-text">Načítám počasí…</div>
</div>

<!-- Dynamic background -->
<div id="bg" class="clear-day"></div>
<canvas id="stars" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>

<!-- Page dots -->
<div id="page-dots"></div>

<!-- Refresh -->
<button id="refresh-btn" onclick="refreshAll()">↺ Aktualizovat</button>

<!-- Source detail modal -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <h3 id="modal-title">Zdroje <span onclick="closeModal()" style="cursor:pointer;font-size:22px;color:var(--text-tertiary)">✕</span></h3>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Pages wrapper -->
<div id="pages-wrapper">
  <!-- Page: Settings (added dynamically) -->
</div>

<!-- Tab bar -->
<div id="tabbar">
  <button class="tab-btn active" onclick="showTab('weather')" id="tab-weather">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    Počasí
  </button>
  <button class="tab-btn" onclick="showTab('radar')" id="tab-radar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
    </svg>
    Radar
  </button>
  <button class="tab-btn" onclick="showTab('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    Nastavení
  </button>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG

// ═══════════════════════════════════════
// WEATHER ICONS
// ═══════════════════════════════════════
function weatherIcon(code, isNight = false) {
  // WMO/OpenWeather codes → emoji
  const map = {
    clear:      isNight ? '🌙' : '☀️',
    pcloudy:    isNight ? '🌙' : '🌤️',
    cloudy:     '☁️',
    vcloudy:    '🌥️',
    fog:        '🌫️',
    drizzle:    '🌦️',
    rain:       '🌧️',
    heavyrain:  '🌧️',
    snow:       '🌨️',
    sleet:      '🌨️',
    thunder:    '⛈️',
    hail:       '🌨️',
  };
  if (code <= 1)        return map[code === 0 ? 'clear' : 'pcloudy'];
  if (code <= 3)        return map.vcloudy;
  if (code <= 49)       return map.fog;
  if (code <= 59)       return map.drizzle;
  if (code <= 67)       return map.rain;
  if (code <= 77)       return map.snow;
  if (code <= 82)       return map.rain;
  if (code <= 86)       return map.snow;
  if (code <= 99)       return map.thunder;
  return '🌡️';
}
function owCodeToIcon(id, isNight = false) {
  if (id >= 200 && id < 300) return '⛈️';
  if (id >= 300 && id < 400) return '🌦️';
  if (id >= 500 && id < 504) return '🌧️';
  if (id === 511)             return '🌨️';
  if (id >= 520 && id < 600) return '🌧️';
  if (id >= 600 && id < 700) return '🌨️';
  if (id >= 700 && id < 800) return '🌫️';
  if (id === 800)             return isNight ? '🌙' : '☀️';
  if (id === 801)             return isNight ? '🌙' : '🌤️';
  if (id >= 802)              return '☁️';
  return '🌡️';
}
function descFromWMO(code) {
  if (code === 0)              return 'Jasno';
  if (code === 1)              return 'Převážně jasno';
  if (code === 2)              return 'Polojasno';
  if (code === 3)              return 'Zataženo';
  if (code >= 45 && code <=49) return 'Mlha';
  if (code >= 51 && code <=59) return 'Mrholení';
  if (code >= 61 && code <=67) return 'Déšť';
  if (code >= 71 && code <=77) return 'Sníh';
  if (code >= 80 && code <=82) return 'Přeháňky';
  if (code >= 83 && code <=86) return 'Sněhové přeháňky';
  if (code >= 95 && code <=99) return 'Bouřky';
  return 'Proměnlivé';
}

// ═══════════════════════════════════════
// AGGREGATION
// ═══════════════════════════════════════
function aggregate(values) {
  const valid = values.filter(v => v !== null && v !== undefined && !isNaN(v));
  if (!valid.length) return null;
  const avg = valid.reduce((a,b)=>a+b,0)/valid.length;
  const min = Math.min(...valid);
  const max = Math.max(...valid);
  const variance = valid.reduce((s,v)=>s+(v-avg)**2,0)/valid.length;
  const std = Math.sqrt(variance);
  // Confidence: lower spread = higher confidence
  // Normalize by range of the metric (temp ~0-40, so std>5 = low)
  const spread = max - min;
  let conf;
  if (valid.length === 1) conf = 80; // single source
  else if (spread <= 1)   conf = 98;
  else if (spread <= 2)   conf = 92;
  else if (spread <= 4)   conf = 82;
  else if (spread <= 6)   conf = 68;
  else if (spread <= 10)  conf = 50;
  else                    conf = 35;
  return { avg: Math.round(avg*10)/10, min: Math.round(min*10)/10, max: Math.round(max*10)/10, std, conf, count: valid.length };
}

function confLabel(c) {
  if (c >= 85) return ['Vysoká shoda', 'conf-high'];
  if (c >= 65) return ['Střední shoda', 'conf-med'];
  return ['Nízká shoda', 'conf-low'];
}

// ═══════════════════════════════════════
// API FETCHERS
// ═══════════════════════════════════════
async function fetchOpenWeather(lat, lon) {
  if (!CONFIG.apiKeys.openweather) return null;
  try {
    const [cur, fc] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=${CONFIG.units}&lang=cz&appid=${CONFIG.apiKeys.openweather}`).then(r=>r.json()),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=${CONFIG.units}&lang=cz&cnt=40&appid=${CONFIG.apiKeys.openweather}`).then(r=>r.json()),
    ]);
    if (!cur.main) return null;
    const isNight = cur.weather[0].icon.endsWith('n');
    const hourly = (fc.list||[]).slice(0,24).map(h=>({
      time: new Date(h.dt*1000),
      temp: h.main.temp,
      icon: owCodeToIcon(h.weather[0].id, false),
      rain: Math.round((h.pop||0)*100),
    }));
    const daily = groupFcByDay(fc.list||[]);
    return {
      source: 'OpenWeather',
      temp: cur.main.temp,
      feelsLike: cur.main.feels_like,
      humidity: cur.main.humidity,
      wind: Math.round((cur.wind?.speed||0) * 3.6 * 10)/10,
      windDir: cur.wind?.deg || 0,
      pressure: cur.main.pressure,
      desc: cur.weather[0].description,
      icon: owCodeToIcon(cur.weather[0].id, isNight),
      visibility: (cur.visibility||10000)/1000,
      uvIndex: null,
      rainProb: Math.round((fc.list?.[0]?.pop||0)*100),
      isNight,
      hourly,
      daily,
    };
  } catch(e) { console.warn('OW fail', e); return null; }
}

function groupFcByDay(list) {
  const days = {};
  list.forEach(h => {
    const d = new Date(h.dt*1000);
    const key = d.toDateString();
    if (!days[key]) days[key] = { date: d, temps:[], rains:[], icons:[] };
    days[key].temps.push(h.main.temp);
    days[key].rains.push((h.pop||0)*100);
    days[key].icons.push(owCodeToIcon(h.weather[0].id));
  });
  return Object.values(days).slice(0,7).map(d=>({
    date: d.date,
    min: Math.round(Math.min(...d.temps)*10)/10,
    max: Math.round(Math.max(...d.temps)*10)/10,
    rain: Math.round(d.rains.reduce((a,b)=>a+b,0)/d.rains.length),
    icon: d.icons[Math.floor(d.icons.length/2)],
  }));
}

async function fetchWeatherAPI(lat, lon) {
  if (!CONFIG.apiKeys.weatherapi) return null;
  try {
    const r = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${CONFIG.apiKeys.weatherapi}&q=${lat},${lon}&days=7&aqi=no&alerts=no&lang=cs`);
    const d = await r.json();
    if (!d.current) return null;
    const cur = d.current;
    const isNight = !cur.is_day;
    const todayHourly = (d.forecast?.forecastday?.[0]?.hour || []).map(h=>({
      time: new Date(h.time_epoch*1000),
      temp: CONFIG.units==='metric' ? h.temp_c : h.temp_f,
      icon: owCodeToIcon(h.condition.code > 1000 ? 800 : 800, false), // simplified
      rain: h.chance_of_rain,
    }));
    // filter to future hours + next day
    const now = Date.now();
    const tmrHourly = (d.forecast?.forecastday?.[1]?.hour || []).map(h=>({
      time: new Date(h.time_epoch*1000),
      temp: CONFIG.units==='metric' ? h.temp_c : h.temp_f,
      icon: '🌤️',
      rain: h.chance_of_rain,
    }));
    const allHourly = [...todayHourly, ...tmrHourly].filter(h=>h.time >= now - 3600000).slice(0,24);
    const daily = (d.forecast?.forecastday || []).map(fd=>({
      date: new Date(fd.date_epoch*1000),
      min: CONFIG.units==='metric' ? fd.day.mintemp_c : fd.day.mintemp_f,
      max: CONFIG.units==='metric' ? fd.day.maxtemp_c : fd.day.maxtemp_f,
      rain: fd.day.daily_chance_of_rain,
      icon: '🌤️',
    }));
    return {
      source: 'WeatherAPI',
      temp: CONFIG.units==='metric' ? cur.temp_c : cur.temp_f,
      feelsLike: CONFIG.units==='metric' ? cur.feelslike_c : cur.feelslike_f,
      humidity: cur.humidity,
      wind: CONFIG.units==='metric' ? cur.wind_kph : cur.wind_mph,
      windDir: cur.wind_degree,
      pressure: cur.pressure_mb,
      desc: cur.condition.text,
      icon: isNight ? '🌙' : '🌤️',
      visibility: cur.vis_km,
      uvIndex: cur.uv,
      rainProb: cur.precip_mm > 0 ? 80 : (d.forecast?.forecastday?.[0]?.day?.daily_chance_of_rain || 0),
      isNight,
      hourly: allHourly,
      daily,
    };
  } catch(e) { console.warn('WA fail', e); return null; }
}

async function fetchOpenMeteo(lat, lon) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,precipitation_probability,uv_index&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7&wind_speed_unit=${CONFIG.units==='metric'?'kmh':'mph'}&temperature_unit=${CONFIG.units==='metric'?'celsius':'fahrenheit'}`;
    const r = await fetch(url);
    const d = await r.json();
    if (!d.current) return null;
    const c = d.current;
    const hour = new Date().getHours();
    const isNight = hour < 6 || hour >= 21;
    const hourly = [];
    const startIdx = d.hourly.time.findIndex(t => new Date(t) >= new Date() - 3600000);
    for (let i = startIdx; i < Math.min(startIdx+24, d.hourly.time.length); i++) {
      hourly.push({
        time: new Date(d.hourly.time[i]),
        temp: d.hourly.temperature_2m[i],
        icon: weatherIcon(d.hourly.weather_code[i]),
        rain: d.hourly.precipitation_probability[i] || 0,
      });
    }
    const daily = (d.daily?.time || []).map((t,i)=>({
      date: new Date(t),
      min: d.daily.temperature_2m_min[i],
      max: d.daily.temperature_2m_max[i],
      rain: d.daily.precipitation_probability_max[i],
      icon: weatherIcon(d.daily.weather_code[i]),
    }));
    return {
      source: 'Open-Meteo',
      temp: c.temperature_2m,
      feelsLike: c.apparent_temperature,
      humidity: c.relative_humidity_2m,
      wind: c.wind_speed_10m,
      windDir: c.wind_direction_10m,
      pressure: c.surface_pressure,
      desc: descFromWMO(c.weather_code),
      icon: weatherIcon(c.weather_code, isNight),
      visibility: null,
      uvIndex: c.uv_index,
      rainProb: c.precipitation_probability || 0,
      isNight,
      hourly,
      daily,
    };
  } catch(e) { console.warn('OM fail', e); return null; }
}

// ═══════════════════════════════════════
// FETCH ALL FOR CITY
// ═══════════════════════════════════════
async function fetchWeather(lat, lon) {
  const results = await Promise.all([
    fetchOpenWeather(lat, lon),
    fetchWeatherAPI(lat, lon),
    fetchOpenMeteo(lat, lon),
  ]);
  const valid = results.filter(Boolean);
  if (!valid.length) return null;
  return buildAggregated(valid);
}

function buildAggregated(sources) {
  const get = key => sources.map(s=>s[key]).filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  const temp      = aggregate(get('temp'));
  const feelsLike = aggregate(get('feelsLike'));
  const humidity  = aggregate(get('humidity'));
  const wind      = aggregate(get('wind'));
  const pressure  = aggregate(get('pressure'));
  const rainProb  = aggregate(get('rainProb'));
  const uvIndex   = aggregate(get('uvIndex'));
  // Use best source for desc/icon (prefer Open-Meteo if available, else first)
  const primary = sources.find(s=>s.source==='Open-Meteo') || sources[0];
  // Merge hourly: use primary
  const hourly = primary.hourly || [];
  // Merge daily: aggregate min/max per day
  const dailyMap = {};
  sources.forEach(s => {
    (s.daily || []).forEach(d => {
      const key = d.date.toDateString();
      if (!dailyMap[key]) dailyMap[key] = { date: d.date, mins:[], maxs:[], rains:[], icons:[] };
      dailyMap[key].mins.push(d.min);
      dailyMap[key].maxs.push(d.max);
      dailyMap[key].rains.push(d.rain);
      dailyMap[key].icons.push(d.icon);
    });
  });
  const daily = Object.values(dailyMap).slice(0,7).map(d=>({
    date: d.date,
    min: Math.round(Math.min(...d.mins)*10)/10,
    max: Math.round(Math.max(...d.maxs)*10)/10,
    rain: Math.round(d.rains.reduce((a,b)=>a+b,0)/d.rains.length),
    icon: d.icons[Math.floor(d.icons.length/2)],
    minSrc: Math.min(...d.mins),
    maxSrc: Math.max(...d.maxs),
  }));
  return {
    sources,
    temp, feelsLike, humidity, wind, pressure, rainProb, uvIndex,
    desc: primary.desc,
    icon: primary.icon,
    isNight: primary.isNight,
    windDir: primary.windDir,
    visibility: primary.visibility,
    hourly,
    daily,
    updatedAt: new Date(),
  };
}

// ═══════════════════════════════════════
// GEO
// ═══════════════════════════════════════
async function getGPSCity() {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) { rej('no geo'); return; }
    navigator.geolocation.getCurrentPosition(async pos => {
      const {latitude: lat, longitude: lon} = pos.coords;
      try {
        const r = await fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=1&appid=${CONFIG.apiKeys.openweather || 'demo'}`);
        const d = await r.json();
        const name = d[0]?.local_names?.cs || d[0]?.name || 'Vaše poloha';
        res({ name, lat, lon, isGPS: true });
      } catch {
        res({ name: 'Vaše poloha', lat, lon, isGPS: true });
      }
    }, rej, { timeout: 8000 });
  });
}

async function geocodeCity(name) {
  if (CONFIG.apiKeys.openweather) {
    const r = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(name)}&limit=1&appid=${CONFIG.apiKeys.openweather}`);
    const d = await r.json();
    if (d[0]) return { name: d[0].local_names?.cs || d[0].name, lat: d[0].lat, lon: d[0].lon };
  }
  // Open-Meteo geocoding (no key needed)
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=cs&format=json`);
  const d = await r.json();
  if (d.results?.[0]) {
    const c = d.results[0];
    return { name: c.name, lat: c.latitude, lon: c.longitude };
  }
  throw new Error('Město nenalezeno');
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function tempStr(val) {
  if (val === null || val === undefined) return '--';
  return Math.round(val) + (CONFIG.units==='metric' ? '°C' : '°F');
}

function windDirLabel(deg) {
  const dirs = ['S','SSZ','SZ','ZSZ','Z','ZJZ','JZ','JJZ','J','JJV','JV','VJV','V','VSV','SV','SSV'];
  return dirs[Math.round(deg/22.5) % 16];
}

function bgClass(data) {
  if (!data) return 'clear-day';
  const d = data.desc?.toLowerCase() || '';
  const isNight = data.isNight;
  if (d.includes('bouř') || d.includes('thunder')) return 'thunderstorm';
  if (d.includes('sníh') || d.includes('snow'))    return isNight ? 'cloudy-night' : 'snowy';
  if (d.includes('déšť') || d.includes('rain') || d.includes('mrholn') || d.includes('přeháňky')) return isNight ? 'rainy-night' : 'rainy-day';
  if (d.includes('zataž') || d.includes('cloud') || d.includes('mlha')) return isNight ? 'cloudy-night' : 'cloudy-day';
  return isNight ? 'clear-night' : 'clear-day';
}

function drawStars(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.6;
    const r = Math.random() * 1.2 + 0.3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, 2*Math.PI);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.6+0.2})`;
    ctx.fill();
  }
}

function rangeBarHTML(agg, minScale, maxScale) {
  if (!agg) return '';
  const pct = v => Math.max(0, Math.min(100, (v-minScale)/(maxScale-minScale)*100));
  const fillLeft = pct(agg.min);
  const fillRight = pct(agg.max);
  const dotLeft = pct(agg.avg);
  return `<div class="range-bar-outer">
    <div class="range-bar-fill" style="left:${fillLeft}%;width:${fillRight-fillLeft}%"></div>
    <div class="range-bar-dot" style="left:${dotLeft}%"></div>
  </div>`;
}

function renderWeatherPage(idx) {
  const city = cities[idx];
  const data = weatherData[idx];
  const isFirst = idx === 0;
  const unit = CONFIG.units === 'metric' ? '°C' : '°F';

  if (!city) return '';

  const heroMetricVal = () => {
    if (!data) return '–';
    if (CONFIG.heroMetric === 'wind') return `${data.wind?.avg ?? '--'} km/h`;
    if (CONFIG.heroMetric === 'feelslike') return tempStr(data.feelsLike?.avg);
    if (CONFIG.heroMetric === 'rain') return `${Math.round(data.rainProb?.avg ?? 0)} %`;
    return '–';
  };
  const heroMetricLabel = {wind:'Vítr', feelslike:'Pocitová', rain:'Srážky'}[CONFIG.heroMetric];

  const tempAgg = data?.temp;
  const confVal = tempAgg?.conf ?? 0;
  const [confText, confClass] = confLabel(confVal);
  const tempUnit = CONFIG.units === 'metric' ? 'celsius' : 'fahrenheit';
  const [minScale, maxScale] = CONFIG.units === 'metric' ? [-20, 45] : [-4, 113];

  // Hourly
  const hourlyHTML = (data?.hourly || []).slice(0,24).map((h,i) => {
    const isNow = i === 0;
    const timeStr = isNow ? 'Nyní' : h.time.toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'});
    return `<div class="hour-card${isNow?' now':''}">
      <div class="hour-time">${timeStr}</div>
      <div class="hour-icon">${h.icon}</div>
      <div class="hour-temp">${Math.round(h.temp)}${unit}</div>
      ${h.rain > 5 ? `<div class="hour-rain">${h.rain}%</div>` : '<div class="hour-rain" style="opacity:0">0%</div>'}
    </div>`;
  }).join('');

  // Daily
  const dailyMin = Math.min(...(data?.daily||[]).map(d=>d.min));
  const dailyMax = Math.max(...(data?.daily||[]).map(d=>d.max));
  const dayNames = ['Ne','Po','Út','St','Čt','Pá','So'];
  const dailyHTML = (data?.daily || []).slice(0,7).map((d,i) => {
    const label = i === 0 ? 'Dnes' : dayNames[d.date.getDay()];
    const span = dailyMax - dailyMin || 1;
    const barLeft = ((d.min - dailyMin) / span * 100).toFixed(1);
    const barW = ((d.max - d.min) / span * 100).toFixed(1);
    return `<div class="day-row">
      <div class="day-name">${label}</div>
      <div class="day-icon">${d.icon}</div>
      <div class="day-rain">${d.rain > 5 ? d.rain+'%' : ''}</div>
      <div class="day-range-wrap">
        <span class="day-lo">${Math.round(d.min)}°</span>
        <div class="day-bar-outer"><div class="day-bar-fill" style="left:${barLeft}%;width:${barW}%"></div></div>
        <span class="day-hi">${Math.round(d.max)}°</span>
      </div>
    </div>`;
  }).join('');

  // Quick stats
  const uv = data?.uvIndex?.avg;
  const uvClass = !uv ? '' : uv <= 2 ? 'uv-low' : uv <= 5 ? 'uv-med' : uv <= 7 ? 'uv-high' : 'uv-xhigh';

  const noData = !data;

  return `<div class="weather-page-content fade-in">
    ${noData ? `<div style="text-align:center;padding:60px 20px;color:var(--text-secondary)">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <div>Nepodařilo se načíst data.<br>Zkontrolujte API klíče v nastavení.</div>
    </div>` : ''}

    <!-- HERO -->
    <div class="hero">
      <div class="city-name">${city.isGPS ? '⌖ ' : ''}${city.name}</div>
      <div class="hero-temp">${tempStr(tempAgg?.avg)}</div>
      <div class="hero-desc">${data?.desc || '–'}</div>
      <div class="hero-range">${tempStr(tempAgg?.min)} <span style="opacity:0.4">—</span> ${tempStr(tempAgg?.max)}</div>
      <div class="hero-extra" onclick="cycleHeroMetric()">
        <span class="hero-extra-label">${heroMetricLabel}</span>
        <strong>${heroMetricVal()}</strong>
      </div>
    </div>

    <!-- CONSENSUS BAR -->
    ${data ? `<div class="consensus-bar-wrap" onclick="openModal('temp', ${idx})">
      <div class="consensus-label">
        <span>Shoda ${data.sources.length} zdrojů</span>
        <span class="confidence-badge ${confClass}">${confText} · ${confVal}%</span>
      </div>
      ${rangeBarHTML(tempAgg, minScale, maxScale)}
      <div class="tap-hint">Klepněte pro detail zdrojů</div>
    </div>` : ''}

    <!-- QUICK STATS -->
    <div class="quick-stats">
      <div class="stat-pill">
        <span class="stat-pill-label">Vlhkost</span>
        <span class="stat-pill-val">${data?.humidity?.avg ?? '--'}%</span>
        <span class="stat-pill-sub">${data?.humidity ? data.humidity.min+'–'+data.humidity.max+'%' : ''}</span>
      </div>
      <div class="stat-pill">
        <span class="stat-pill-label">Vítr</span>
        <span class="stat-pill-val">${data?.wind?.avg ?? '--'}</span>
        <span class="stat-pill-sub">${data?.windDir !== undefined ? windDirLabel(data.windDir) : ''} km/h</span>

// ═══════════════════════════════════════
// CHART
// ═══════════════════════════════════════
function drawTempChart(idx) {
  const canvas = document.getElementById(`temp-chart-${idx}`);
  if (!canvas) return;
  const data = weatherData[idx];
  if (!data?.hourly?.length) return;
  const points = data.hourly.slice(0, 24);
  const w = canvas.offsetWidth * 2;
  const h = 220;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const temps = points.map(p=>p.temp);
  const minT = Math.min(...temps) - 1;
  const maxT = Math.max(...temps) + 1;
  const pad = { l:30, r:16, t:20, b:32 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const xOf = i => pad.l + (i/(points.length-1))*cw;
  const yOf = t => pad.t + (1-(t-minT)/(maxT-minT))*ch;
  ctx.clearRect(0,0,w,h);
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const y = pad.t + (g/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w-pad.r, y); ctx.stroke();
  }
  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, h-pad.b);
  grad.addColorStop(0, 'rgba(90,200,250,0.35)');
  grad.addColorStop(1, 'rgba(90,200,250,0.0)');
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(temps[0]));
  for (let i=1;i<points.length;i++) {
    const x0=xOf(i-1),y0=yOf(temps[i-1]),x1=xOf(i),y1=yOf(temps[i]);
    const cpx=(x0+x1)/2;
    ctx.bezierCurveTo(cpx,y0,cpx,y1,x1,y1);
  }
  ctx.lineTo(xOf(points.length-1), h-pad.b);
  ctx.lineTo(xOf(0), h-pad.b);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(90,200,250,0.9)'; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.moveTo(xOf(0), yOf(temps[0]));
  for (let i=1;i<points.length;i++) {
    const x0=xOf(i-1),y0=yOf(temps[i-1]),x1=xOf(i),y1=yOf(temps[i]);
    ctx.bezierCurveTo((x0+x1)/2,y0,(x0+x1)/2,y1,x1,y1);
  }
  ctx.stroke();
  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = `${22}px Outfit,sans-serif`;
  ctx.textAlign = 'center';
  // Show every 4h
  for (let i=0;i<points.length;i+=4) {
    const x = xOf(i);
    const t = points[i].time;
    const label = i===0?'Nyní':t.toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'});
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(label, x, h-6);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(Math.round(temps[i])+'°', x, yOf(temps[i])-8);
  }
  // Dot at current
  ctx.beginPath();
  ctx.arc(xOf(0), yOf(temps[0]), 5, 0, 2*Math.PI);
  ctx.fillStyle = '#5ac8fa'; ctx.fill();
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openModal(metric, idx) {
  const data = weatherData[idx];
  if (!data) return;
  const labels = { temp:'Teplota', feelslike:'Pocitová teplota', wind:'Vítr', humidity:'Vlhkost', rainProb:'Srážky', pressure:'Tlak' };
  const units  = { temp: CONFIG.units==='metric'?'°C':'°F', feelslike: CONFIG.units==='metric'?'°C':'°F', wind:'km/h', humidity:'%', rainProb:'%', pressure:'hPa' };
  const colors = ['#5ac8fa','#ff9f0a','#34c759','#bf5af2'];
  const agg = metric === 'feelslike' ? data.feelsLike : data[metric === 'temp' ? 'temp' : metric];
  const title = labels[metric] || metric;
  const unit = units[metric] || '';
  document.getElementById('modal-title').innerHTML = `${title} – zdroje <span onclick="closeModal()" style="cursor:pointer;font-size:22px;color:var(--text-tertiary)">✕</span>`;
  const rows = data.sources.map((s,i) => {
    const val = metric === 'feelslike' ? s.feelsLike : s[metric === 'temp' ? 'temp' : metric];
    if (val === null || val === undefined) return '';
    return `<div class="source-row">
      <div class="source-dot" style="background:${colors[i%colors.length]}"></div>
      <div class="source-name">${s.source}</div>
      <div>
        <div class="source-val">${Math.round(val*10)/10} ${unit}</div>
      </div>
    </div>`;
  }).join('');
  const confVal = agg?.conf ?? 0;
  const [confText, confClass] = confLabel(confVal);
  document.getElementById('modal-content').innerHTML = `
    <div style="margin-bottom:12px;padding:12px;background:rgba(255,255,255,0.07);border-radius:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>Průměr: <strong>${agg ? Math.round(agg.avg*10)/10 : '--'} ${unit}</strong></div>
        <span class="confidence-badge ${confClass}">${confText} · ${confVal}%</span>
      </div>
      <div style="font-size:13px;color:var(--text-secondary)">Rozmezí: ${agg ? agg.min : '--'} – ${agg ? agg.max : '--'} ${unit}</div>
    </div>
    ${rows || '<div style="color:var(--text-tertiary)">Žádné zdroje</div>'}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ═══════════════════════════════════════
// PAGES MANAGEMENT
// ═══════════════════════════════════════
let pageOrder = []; // indices of cities

function buildWeatherPages() {
  const wrapper = document.getElementById('pages-wrapper');
  wrapper.innerHTML = '';
  pageOrder = cities.map((_,i)=>i);
  pageOrder.forEach(i => {
    const page = document.createElement('div');
    page.className = 'page';
    page.id = `page-city-${i}`;
    page.innerHTML = renderWeatherPage(i);
    wrapper.appendChild(page);
    setTimeout(() => drawTempChart(i), 100);
  });
  buildDots();
  goToPage(Math.min(currentPage, cities.length-1));
}

function buildDots() {
  const el = document.getElementById('page-dots');
  el.innerHTML = cities.map((c,i)=>`<div class="dot${c.isGPS?' gps':''}${i===currentPage?' active':''}" onclick="goToPage(${i})"></div>`).join('');
  el.style.display = currentTab === 'weather' ? 'flex' : 'none';
}

function goToPage(idx) {
  if (idx < 0 || idx >= cities.length) return;
  currentPage = idx;
  document.getElementById('pages-wrapper').style.transform = `translateX(-${idx*100}vw)`;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  // Update background
  const data = weatherData[idx];
  if (data) {
    document.getElementById('bg').className = bgClass(data);
    const isNight = data.isNight;
    if (isNight) drawStars(document.getElementById('stars'));
    else { const c = document.getElementById('stars').getContext('2d'); c.clearRect(0,0,9999,9999); }
  }
}

// ═══════════════════════════════════════
// TAB MANAGEMENT
// ═══════════════════════════════════════
let radarPage = null, settingsPage = null;

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById('page-dots').style.display = tab === 'weather' ? 'flex' : 'none';
  document.getElementById('refresh-btn').style.display = tab === 'weather' ? 'block' : 'none';

  const wrapper = document.getElementById('pages-wrapper');
  if (tab === 'weather') {
    buildWeatherPages();
  } else if (tab === 'radar') {
    wrapper.innerHTML = '';
    const page = document.createElement('div');
    page.className = 'page'; page.style.transform = 'none';
    page.innerHTML = renderRadarPage(currentPage);
    wrapper.appendChild(page);
    wrapper.style.transform = 'none';
  } else if (tab === 'settings') {
    wrapper.innerHTML = '';
    const page = document.createElement('div');
    page.className = 'page'; page.style.transform = 'none';
    page.innerHTML = renderSettingsPage();
    wrapper.appendChild(page);
    wrapper.style.transform = 'none';
  }
}

// ═══════════════════════════════════════
// SWIPE
// ═══════════════════════════════════════
function initSwipe() {
  const wrapper = document.getElementById('pages-wrapper');
  let startX = 0, startY = 0, dragging = false;

  wrapper.addEventListener('touchstart', e => {
    if (currentTab !== 'weather') return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true;
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    if (!dragging || currentTab !== 'weather') return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; return; }
    const base = -currentPage * 100;
    const pct = (dx / window.innerWidth) * 100;
    wrapper.style.transition = 'none';
    wrapper.style.transform = `translateX(${base + pct}vw)`;
  }, { passive: true });

  wrapper.addEventListener('touchend', e => {
    if (!dragging || currentTab !== 'weather') return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    wrapper.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
    if (dx < -50 && currentPage < cities.length-1) goToPage(currentPage+1);
    else if (dx > 50 && currentPage > 0) goToPage(currentPage-1);
    else goToPage(currentPage);
  }, { passive: true });
}

// ═══════════════════════════════════════
// SETTINGS ACTIONS
// ═══════════════════════════════════════
async function addCity() {
  const input = document.getElementById('add-city-input');
  if (!input) return;
  const name = input.value.trim();
  if (!name) return;
  input.value = '';
  try {
    const city = await geocodeCity(name);
    cities.push(city);
    saveCities();
    showTab('settings');
    refreshAll();
  } catch(e) {
    alert('Město nebylo nalezeno. Zkuste jiný název.');
  }
}

function deleteCity(idx) {
  cities.splice(idx, 1);
  saveCities();
  showTab('settings');
}

function saveCities() {
  localStorage.setItem('cities', JSON.stringify(cities));
}

function saveApiKeys() {
  CONFIG.apiKeys.openweather = document.getElementById('ow-key').value.trim();
  CONFIG.apiKeys.weatherapi  = document.getElementById('wa-key').value.trim();
  localStorage.setItem('ow_key', CONFIG.apiKeys.openweather);
  localStorage.setItem('wa_key', CONFIG.apiKeys.weatherapi);
  refreshAll();
}

function setUnits(val) {
  CONFIG.units = val;
  localStorage.setItem('units', val);
  refreshAll();
}

function setHeroMetric(val) {
  CONFIG.heroMetric = val;
  localStorage.setItem('heroMetric', val);
  if (currentTab === 'weather') buildWeatherPages();
}

function cycleHeroMetric() {
  const opts = ['wind','feelslike','rain'];
  const idx = opts.indexOf(CONFIG.heroMetric);
  setHeroMetric(opts[(idx+1)%opts.length]);
}

function clearCache() {
  localStorage.removeItem('weather_cache');
  weatherData = {};
  refreshAll();
}

// ═══════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.textContent = '↺ …';

  const promises = cities.map(async (city, i) => {
    try {
      const data = await fetchWeather(city.lat, city.lon);
      if (data) weatherData[i] = data;
    } catch(e) { console.error('fetch fail', e); }
  });
  await Promise.all(promises);

  // Cache
  localStorage.setItem('weather_cache', JSON.stringify({
    data: weatherData,
    ts: Date.now(),
    cities,
  }));

  if (currentTab === 'weather') buildWeatherPages();
  else if (currentTab === 'settings') showTab('settings');

  if (btn) btn.textContent = '↺ Aktualizovat';
}

function loadCache() {
  try {
    const raw = localStorage.getItem('weather_cache');
    if (!raw) return false;
    const c = JSON.parse(raw);
    if (Date.now() - c.ts > 30 * 60 * 1000) return false; // 30 min stale
    weatherData = c.data || {};
    return true;
  } catch { return false; }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  document.getElementById('loading').classList.remove('hidden');

  // Load cached data fast
  const hasCached = loadCache();
  if (hasCached && cities.length) {
    buildWeatherPages();
    initSwipe();
    document.getElementById('loading').classList.add('hidden');
  }

  // Try GPS
  try {
    const gpsCity = await getGPSCity();
    const existing = cities.findIndex(c => c.isGPS);
    if (existing >= 0) cities[existing] = gpsCity;
    else cities.unshift(gpsCity);
    saveCities();
  } catch(e) {
    // No GPS permission or unavailable
    if (!cities.length) {
      // Default: Prague
      cities.push({ name: 'Praha', lat: 50.0755, lon: 14.4378 });
      saveCities();
    }
  }

  await refreshAll();
  initSwipe();
  document.getElementById('loading').classList.add('hidden');
}

window.addEventListener('load', init);
window.addEventListener('resize', () => {
  if (currentTab === 'weather') {
    pageOrder.forEach(i => drawTempChart(i));
  }
});

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
